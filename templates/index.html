<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Conversion Service</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

    <div class="container">
        <h1>Image Conversion Service</h1>
        <p>Upload an image to convert it to WebP format.</p>

        <form action="/convert" method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="form-group">
                <label for="file">Choose an image file (JPEG/PNG only):</label>
                <input type="file" name="file" id="file" accept="image/jpeg, image/png, application/pdf, .doc, .docx" required>
            </div>

            <div class="form-group">
                <label for="target">Select the target format:</label>
                <select name="target" id="target">
                    <option value="webp" selected>WebP</option>
                    <option value="pdf" selected>Word (.doc/.docx) to PDF</option>
                    <option value="docx" selected>PDF to Word (.docx)</option>
                </select>
            </div>

            <button type="submit">Convert Image</button>
        </form>

        <div id="result" style="display: none;">
            <h3>Download your converted image</h3>
            <a id="downloadLink" href="" download>Download Converted Image</a>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
