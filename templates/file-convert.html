<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Conversion Service</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <a href="/" class="home-button">Home</a>
    </header>
    <div class="container">
        <h1>File Conversion</h1>
        <p>Upload an file to convert it to WebP/Word/Pdf format.</p>

        <form action="/convert" method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="form-group">
                <label for="file">Choose an file (JPEG/PNG/doc(x)/pdf only):</label>
                <input type="file" name="file" id="file" accept="image/jpeg, image/png, application/pdf, .doc, .docx" required>
            </div>

            <div class="form-group">
                <label for="target">Select the target format:</label>
                <select name="target" id="target">
                    <option value="webp" selected>WebP</option>
                    <option value="pdf" selected>Word (.doc/.docx) to PDF</option>
                    <option value="docx" selected>PDF to Word (.docx)</option>
                </select>
            </div>

            <button type="submit" id="submit-btn">Convert File</button>
        </form>

        <div id="result" style="display: none;">
            <!-- <h3>Download your converted file</h3>
            <a id="downloadLink" href="" download>Download Converted File</a> -->
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
